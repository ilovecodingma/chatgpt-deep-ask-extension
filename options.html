<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ChatGPT 상세 질문 옵션</title>
  <style>
    :root {
      --bg: #fff;
      --fg: #222;
      --muted: #666;
      --border: #d0d0d0;
      --accent: #10a37f;
      --accent-hover: #0d8265;
      --danger: #c0392b;
      --input-bg: #fff;
      --card-bg: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202123;
        --fg: #ececec;
        --muted: #aaa;
        --border: #3a3a3a;
        --accent: #1eb98a;
        --accent-hover: #34c79b;
        --danger: #ed5f4f;
        --input-bg: #2a2b2d;
        --card-bg: #2a2b2d;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 32px;
      max-width: 760px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .help {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.55;
    }
    .help code {
      background: rgba(127,127,127,0.18);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 11.5px;
    }
    .template {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      background: var(--card-bg);
    }
    .template label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin: 0 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .template input[type="text"], .template textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--fg);
      font: inherit;
    }
    .template textarea {
      min-height: 90px;
      resize: vertical;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 12.5px;
    }
    .template-row { margin-bottom: 10px; }
    .template-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }
    button:hover { background: rgba(127,127,127,0.12); }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    button.danger {
      color: var(--danger);
      border-color: var(--border);
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      align-items: center;
    }
    #status {
      font-size: 12px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    #status.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>프롬프트 템플릿</h1>
  <div class="subtitle">우클릭 메뉴 "ChatGPT 템플릿" 하위 항목으로 등록되어 선택 텍스트와 함께 ChatGPT에 보냅니다.</div>

  <div class="help">
    템플릿 내용 안에 <code>{TEXT}</code> 라고 적으면 선택한 텍스트가 그 자리에 들어갑니다.
    <code>{URL}</code>, <code>{TITLE}</code> 도 사용 가능합니다 (현재 페이지 정보).
    추가/삭제한 뒤 <strong>저장</strong>하고 확장을 한 번 새로고침하면 우클릭 메뉴에 반영됩니다.
  </div>

  <div id="templates"></div>

  <div class="toolbar">
    <div>
      <button id="add-btn">+ 새 템플릿 추가</button>
      <button id="reset-btn" class="danger">기본값으로 초기화</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="status"></span>
      <button id="save-btn" class="primary">저장</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
