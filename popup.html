<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ChatGPT 상세 질문</title>
  <style>
    :root {
      --bg: #fff;
      --fg: #222;
      --border: #e0e0e0;
      --header-bg: #f7f7f8;
      --item-hover: #f0f0f1;
      --muted: #888;
      --accent: #10a37f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202123;
        --fg: #ececec;
        --border: #3a3a3a;
        --header-bg: #2a2b2d;
        --item-hover: #2e2f31;
        --muted: #aaa;
        --accent: #1eb98a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 13px/1.4 -apple-system, system-ui, "Segoe UI", sans-serif;
      width: 360px;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      padding: 10px 12px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
    }
    header .actions {
      display: flex;
      gap: 6px;
    }
    header button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      padding: 3px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
    }
    header button:hover { background: var(--item-hover); }
    .empty {
      padding: 24px 16px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }
    .item {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .item:hover { background: var(--item-hover); }
    .item:last-child { border-bottom: none; }
    .item-row1 {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .item-type {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .item-time {
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }
    .item-summary {
      font-size: 12px;
      color: var(--fg);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .footer {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>최근 호출</h1>
    <div class="actions">
      <button id="clear-btn">기록 비우기</button>
    </div>
  </header>
  <div id="list"></div>
  <div class="footer">
    <a id="options-link">⚙ 옵션</a>
    <span style="margin-left:auto" id="count-label"></span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
